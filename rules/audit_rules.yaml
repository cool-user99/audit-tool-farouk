rules:
  - id: R1
    name: hostname_check
    criticite: MAJEURE
    pattern: "^hostname\\s+\\S+"
    message_echec: "Hostname manquant ou invalide"
    inverse: false

  - id: R2
    name: password_cleartext
    criticite: CRITIQUE
    pattern: "enable password\\s+\\S+"
    message_echec: "Mot de passe en clair détecté"
    inverse: true

  - id: R3
    name: interface_description
    criticite: MOYENNE
    pattern: "^\\s+description\\s+\\S+"
    message_echec: "Interface sans description détectée"
    inverse: false

  - id: R4
    name: vlan_check
    criticite: MOYENNE
    pattern: "^vlan\\s+\\d+"
    message_echec: "Aucun VLAN déclaré"
    inverse: false

  - id: R5
    name: ip_address_check
    criticite: MAJEURE
    pattern: "ip address\\s+\\d+\\.\\d+\\.\\d+\\.\\d+"
    message_echec: "Adresse IP manquante sur les interfaces"
    inverse: false

  - id: R6
    name: static_route_check
    criticite: MOYENNE
    pattern: "ip route.*!.*"
    message_echec: "Route statique non documentée (commentaire manquant)"
    inverse: false

  - id: R7
    name: ssh_check
    criticite: CRITIQUE
    pattern: "transport input ssh"
    message_echec: "SSH non configuré sur les lignes VTY"
    inverse: false

  - id: R8
    name: ntp_check
    criticite: MINEURE
    pattern: "^ntp server\\s+\\S+"
    message_echec: "Serveur NTP non configuré"
    inverse: false